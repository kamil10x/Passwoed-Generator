<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Password Generator</h2>
        <div class="inputBox" >
            <input type="text" class="passBox" disabled>
        </div>
        <input type="range" min="1" max="20" value="8" id="inputSlide">
        <div class="select" style="display: flex; justify-content:space-between">
            <p>Password Length</p>
            <span id="sliderVal"></span>
        </div>
        <div class="select">
            <label for="lowercase">Include Lowercase Letters(a-z)</label>
            <input type="checkbox" name="lowercase" id="lowercase">
        </div>
        <div class="select">
            <label for="uppercase">Include uppercase Letters(A-Z)</label>
            <input type="checkbox" name="uppercase" id="uppercase">
        </div>
        <div class="select">
            <label for="numbers">Include Numbers(0-9)</label>
            <input type="checkbox" name="numbers" id="numbers">
        </div>
        <div class="select">
            <label for="symbols">Include Symbols(@-*)</label>
            <input type="checkbox" name="symbols" id="symbols">
        </div>
        <div class="generateBtn" id="btn">
            <h2>Generate Password</h2>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
